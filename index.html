<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUTARO WEB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f6f3ef; 
            --text-main: #3c2f2f; 
            --text-sub: #8a7a75; 
            --line-color: #e2ded9; 
            --card-bg: #faf8f5;
        }

        body.dark-mode {
            --bg-color: #1a1616;
            --text-main: #f6f3ef;
            --text-sub: #b2a4a0;
            --line-color: #2e2828;
            --card-bg: #221d1d;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.8;
            transition: background-color 0.4s, color 0.4s;
        }

        /* 常に上についてくるナビゲーションバー */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--line-color);
            z-index: 1000;
            box-sizing: border-box;
            transition: background-color 0.4s, border-color 0.4s;
        }

        .nav-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-link {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: var(--text-main);
            text-decoration: none;
        }

        .mode-toggle {
            background: none;
            border: 1px solid var(--text-sub);
            color: var(--text-main);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        main {
            max-width: 500px;
            margin: 110px auto 100px;
            padding: 0 24px;
        }

        /* 上部：名前＋簡単な説明 */
        .profile-header {
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--line-color);
        }

        .profile-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .profile-header p {
            font-size: 0.95rem;
            color: var(--text-sub);
            margin: 0;
        }

        /* 個別セクション */
        section {
            margin-bottom: 60px;
        }

        /* デカデカとタイトルを強調 */
        .big-title {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 0 0 15px 0;
            letter-spacing: -0.5px;
        }

        /* 数学44点だけ、この綺麗めなデザインを崩さない上品な赤に */
        .big-title.math {
            color: #b91c1c;
        }

        .desc-text {
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--text-main);
            margin: 0;
        }

        /* フッターのURLカプセル */
        footer {
            text-align: center;
            margin-top: 80px;
        }

        .url-badge {
            display: inline-block;
            background-color: var(--card-bg);
            border: 1px solid var(--line-color);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

    <!-- 追従ナビバー -->
    <header>
        <div class="nav-container">
            <a href="javascript:window.location.reload();" class="logo-link">YUTARO WEB</a>
            <button class="mode-toggle" onclick="toggleMode()">画面の色を変える</button>
        </div>
    </header>

    <main>

        <!-- 【改善】上部はシンプルに名前＋簡単な説明 -->
        <div class="profile-header">
            <h1>優太郎</h1>
            <p>中学1年生。マイクラが好きです。</p>
        </div>

        <!-- 【改善】数学44点セクション -->
        <section>
            <div class="big-title math">数学 44点</div>
            <p class="desc-text">
                前回の定期テストの結果。アドオン作りに熱中しすぎて完全に勉強時間が足りませんでした。次は平均点以上を狙って、そろそろ本気出します。
            </p>
        </section>

        <!-- 【改善】マイクラアドオンセクション -->
        <section>
            <div class="big-title">マイクラアドオン開発</div>
            <p class="desc-text">
                ただ遊ぶだけじゃなくて、自分でBehavior PackやResource PackのJSONコードを書き換えて、新しい要素を自作するのが趣味です。
            </p>
        </section>

        <!-- カプセル型URL -->
        <footer>
            <div class="url-badge">yutaro-index.html</div>
        </footer>

    </main>

    <script>
        function toggleMode() {
            const body = document.body;
            const btn = document.querySelector('.mode-toggle');
            body.classList.toggle('dark-mode');
            
            if(body.classList.contains('dark-mode')) {
                btn.textContent = '元に戻す';
            } else {
                btn.textContent = '画面の色を変える';
            }
        }
    </script>

</body>
</html>
