<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUTARO WEB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f6f3ef; /* スクショの上品なベージュ */
            --text-main: #000000; /* 高級感を出すための絶対的な黒 */
            --text-sub: #7a6e67; /* 落ち着いたニュアンスカラー */
            --gold-line: #d4af37; /* 本物のゴールド（上品な細線用） */
            --line-color: #e2ded9; 
            --card-bg: #faf8f5;
        }

        body.dark-mode {
            --bg-color: #141210; /* 深みのある黒 */
            --text-main: #ffffff;
            --text-sub: #b2a7a0;
            --gold-line: #c5a028; /* ダークモードに映えるゴールド */
            --line-color: #2e2a26;
            --card-bg: #1c1917;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.8;
            letter-spacing: 0.5px;
            transition: background-color 0.4s, color 0.4s;
        }

        /* 画面最上部に固定されるナビゲーションバー */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--line-color);
            z-index: 1000;
            box-sizing: border-box;
            transition: background-color 0.4s, border-color 0.4s;
        }

        .nav-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-link {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--text-main);
            text-decoration: none;
        }

        .mode-toggle {
            background: none;
            border: 1px solid var(--text-sub);
            color: var(--text-main);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* メインコンテンツエリア */
        main {
            max-width: 480px;
            margin: 130px auto 100px;
            padding: 0 24px;
        }

        /* 上部：名前＋簡単な説明 */
        .profile-header {
            margin-bottom: 50px;
        }

        .profile-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0 0 8px 0;
        }

        .profile-header p {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin: 0;
        }

        /* セクション設定 */
        section {
            margin-bottom: 45px;
        }

        /* 【改善】美しく上品なサイズの見出し ＋ 金色の下線 */
        h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--gold-line); /* 細く品のあるゴールド線 */
            letter-spacing: 1px;
        }

        .desc-text {
            font-size: 0.9rem;
            font-weight: 400;
            margin: 0;
            color: var(--text-main);
            text-align: justify;
        }

        /* フッターのURLカプセル */
        footer {
            text-align: center;
            margin-top: 70px;
        }

        .url-badge {
            display: inline-block;
            background-color: var(--card-bg);
            border: 1px solid var(--line-color);
            padding: 6px 22px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

    <!-- 追従ナビゲーションバー -->
    <header>
        <div class="nav-container">
            <a href="javascript:window.location.reload();" class="logo-link">YUTARO WEB</a>
            <button class="mode-toggle" onclick="toggleMode()">画面の色を変える</button>
        </div>
    </header>

    <main>

        <!-- 上部：名前＋簡単な説明 -->
        <div class="profile-header">
            <h1>優太郎</h1>
            <p>中学1年生。マイクラが好きです。</p>
        </div>

        <!-- マイクラアドオンセクション -->
        <section>
            <h2>マイクラアドオン開発</h2>
            <p class="desc-text">
                ただ遊ぶだけではなく、自分でBehavior PackやResource PackのJSONコードを書き換えて、新しい要素を自作するのが趣味です。
            </p>
        </section>

        <!-- 数学44点セクション -->
        <section>
            <h2>数学 44点</h2>
            <p class="desc-text">
                前回の定期テストの結果。アドオン作りに熱中しすぎて、完全に勉強時間が足りませんでした。次は平均点以上を狙って、そろそろ本気出します。
            </p>
        </section>

        <!-- カプセル型URLバー -->
        <footer>
            <div class="url-badge">yutaro-index.html</div>
        </footer>

    </main>

    <script>
        function toggleMode() {
            const body = document.body;
            const btn = document.querySelector('.mode-toggle');
            body.classList.toggle('dark-mode');
            
            if(body.classList.contains('dark-mode')) {
                btn.textContent = '元に戻す';
            } else {
                btn.textContent = '画面の色を変える';
            }
        }
    </script>

</body>
</html>
