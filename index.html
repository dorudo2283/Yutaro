<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUTARO WEB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f6f3ef; /* スクショの上品なベージュ */
            --text-main: #000000; /* 高級感を出すための絶対的な黒 */
            --text-sub: #7a6e67; /* 落ち着いたニュアンスカラー */
            --gold-line: #d4af37; /* 本物のゴールド（上品な細線用） */
            --line-color: #e2ded9; 
            --card-bg: #faf8f5;
        }

        body.dark-mode {
            --bg-color: #141210; 
            --text-main: #ffffff;
            --text-sub: #b2a7a0;
            --gold-line: #c5a028; 
            --line-color: #2e2a26;
            --card-bg: #1c1917;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.8;
            letter-spacing: 0.5px;
            transition: background-color 0.4s, color 0.4s;
        }

        /* 追従ナビゲーションバー */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--line-color);
            z-index: 1000;
            box-sizing: border-box;
            transition: background-color 0.4s, border-color 0.4s;
        }

        .nav-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-link {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--text-main);
            text-decoration: none;
        }

        /* 修正：ボタンをシンプルに「ダーク / ライト」表記に */
        .mode-toggle {
            background: none;
            border: 1px solid var(--text-sub);
            color: var(--text-main);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        main {
            max-width: 480px;
            margin: 130px auto 100px;
            padding: 0 24px;
        }

        /* 上部：名前＋簡単な説明 */
        .profile-header {
            margin-bottom: 50px;
        }

        .profile-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0 0 8px 0;
        }

        .profile-header p {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin: 0;
        }

        section {
            margin-bottom: 50px;
        }

        /* 上品な金色の下線（アニメーション付き） */
        h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 15px 0;
            padding-bottom: 6px;
            position: relative;
            letter-spacing: 1px;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: var(--gold-line);
            animation: lineExpand 1.2s ease-out forwards;
            transform-origin: left;
        }

        @keyframes lineExpand {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        /* リスト形式の実績欄 */
        .list-container {
            border-top: 1px solid var(--line-color);
            margin-bottom: 20px;
        }

        .list-item {
            border-bottom: 1px solid var(--line-color);
            padding: 14px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-title {
            font-size: 0.9rem;
            font-weight: 400;
        }

        .list-value {
            font-size: 0.9rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        /* 修正：44点の通常カラー版 */
        .list-value.math-score {
            color: var(--text-main);
            font-weight: 700;
        }

        .desc-text {
            font-size: 0.9rem;
            font-weight: 400;
            margin: 0;
            color: var(--text-main);
            text-align: justify;
        }

        /* 下の方にひっそり置く「実は天才」 */
        .secret-note {
            text-align: center;
            margin-top: 80px;
            font-size: 0.8rem;
            color: var(--text-sub);
            opacity: 0.6;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- 追従ナビゲーションバー -->
    <header>
        <div class="nav-container">
            <a href="javascript:window.location.reload();" class="logo-link">YUTARO WEB</a>
            <button class="mode-toggle" onclick="toggleMode()">ダーク</button>
        </div>
    </header>

    <main>

        <!-- 上部：名前＋簡単な説明 -->
        <div class="profile-header">
            <h1>優太郎　YUTARO</h1>
            <p> HTML、Javascript、JSON辺りがなぜかできた一般人。ただの天才ですw</p>
        </div>

        <!-- 実績セクション -->
        <section>
            <h2>実績</h2>
            <div class="list-container">
                <div class="list-item">
                    <span class="list-title">WEBサイト作成</span>
                    <span class="list-value">プロ級に上手い(？)</span>
                </div>
                <div class="list-item">
                    <span class="list-title">アドオン制作</span>
                    <span class="list-value">ほぼ出来てたけど、アプデで構文変わって泣いた</span>
                </div>
                <!-- 修正：「直近の」を削除、44点の色を統一 -->
                <div class="list-item">
                    <span class="list-title">数学の定期テスト</span>
                    <span class="list-value math-score">44点。ノーコメ。</span>
                </div>
            </div>
        </section>

        <!-- アドオン制作について -->
        <section>
            <h2>アドオン制作について</h2>
            <p class="desc-text">
                マイクラに飽きたのでアドオンていうものを作って見ました。思ったより楽しくて最近ではアドオンを自作するのが趣味です。
            </p>
        </section>

        <!-- 数学44点について -->
        <section>
            <h2>数学44点について</h2>
            <p class="desc-text">
                前回のテスト結果。なぜ人間は50点を基準にして判断するのか。次は平均点以上を狙って、そろそろ本気を出します。
            </p>
        </section>

        <!-- 下の方にひっそり置いたオチ -->
        <div class="secret-note">
            ※いろいろ書きましたが、実は天才です。
        </div>

    </main>

    <script>
        function toggleMode() {
            const body = document.body;
            const btn = document.querySelector('.mode-toggle');
            body.classList.toggle('dark-mode');
            
            if(body.classList.contains('dark-mode')) {
                btn.textContent = 'ライト';
            } else {
                btn.textContent = 'ダーク';
            }
        }
    </script>

</body>
</html>
